<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Infotainment System</title>
    <style>
        :root {
            --bg-main: #07090e;
            --bg-panel: #0f131a;
            --bg-display: #020305;
            --border-premium: #1c2331;
            --premium-bronze: #c19a6b;
            --premium-bronze-glow: rgba(193, 154, 107, 0.2);
            --neon-green: #10b981;
            --text-main: #f1f5f9;
            --text-dark: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { 
            background: var(--bg-main); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 15px;
            background-image: radial-gradient(circle at 50% 10%, #151d2a 0%, var(--bg-main) 80%);
        }

        /* DISEÑO DE PANTALLA PANORÁMICA DE COCHE */
        .infotainment-screen {
            width: 100%;
            max-width: 960px;
            background: var(--bg-panel);
            border-radius: 24px;
            border: 1px solid var(--border-premium);
            box-shadow: 0 30px 70px rgba(0,0,0,0.85), inset 0 1px 2px rgba(255,255,255,0.05);
            overflow: hidden;
            display: grid;
            grid-template-rows: 50px 1fr;
        }

        /* BARRA DE ESTADO SUPERIOR DEL VEHÍCULO */
        .top-status-bar {
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid var(--border-premium);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #94a3b8;
        }
        .brand-logo { color: #fff; display: flex; align-items: center; gap: 8px; }
        .brand-logo span { color: var(--premium-bronze); }

        /* ARQUITECTURA EN DOS COLUMNAS (SPLIT SCREEN) */
        .main-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
        }
        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
            .telemetry-panel { display: none; } /* Ocultar en móviles pequeños para priorizar radio */
        }

        /* COLUMNA 1: AUDIO & RDS CONTROL */
        .audio-panel {
            padding: 25px;
            border-right: 1px solid var(--border-premium);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .media-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .media-title { font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--premium-bronze); font-weight: 700; }

        .power-btn {
            background: #181f2b;
            border: 1px solid var(--border-premium);
            color: #94a3b8;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        .power-btn.on {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        /* DISPLAY OLED MULTIFUNCIÓN */
        .oled-display {
            background: var(--bg-display);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.02);
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.8);
            position: relative;
        }
        .oled-display::after {
            content: ""; position: absolute; top:0; left:0; right:0; bottom:0;
            background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.15) 50%); background-size: 100% 4px;
            pointer-events: none;
        }

        .rds-flags {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: 1px;
            border-bottom: 1px solid #0f131a;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }
        .flag.active { color: #64748b; }
        #flag-st.active { color: #38bdf8; text-shadow: 0 0 4px rgba(56,189,248,0.4); }

        .af-status {
            background: #0f131a; padding: 2px 6px; border-radius: 4px; color: var(--text-dark);
        }
        .af-status.ok { color: var(--neon-green); background: rgba(16,185,129,0.08); }
        .af-status.searching { color: #eab308; background: rgba(234,179,8,0.08); animation: pulse 1s infinite; }

        .rds-ps {
            font-family: 'SF Mono', Consolas, monospace;
            font-size: 40px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            margin: 5px 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .marquee-box {
            background: rgba(255,255,255,0.01); padding: 6px; border-radius: 6px; overflow: hidden; white-space: nowrap; margin: 10px 0;
        }
        .rds-rt {
            display: inline-block; font-size: 11px; color: #94a3b8; font-family: monospace; padding-left: 100%; animation: marquee 15s linear infinite;
        }

        /* SELECTORES TÁCTILES ESTILO COCHE */
        .infotainment-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: #080b10;
            padding: 4px;
            border-radius: 12px;
        }
        .info-tab {
            background: transparent; border: none; color: #64748b; padding: 12px; font-size: 12px; font-weight: 700; border-radius: 9px; cursor: pointer; transition: all 0.2s;
        }
        .info-tab.active { background: #1c2331; color: #fff; }

        /* COLUMNA 2: TELEMETRÍA Y REPETIDORES */
        .telemetry-panel {
            padding: 25px;
            background: rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .widget-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .widget-card {
            background: #141923;
            border: 1px solid var(--border-premium);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .widget-label { font-size: 10px; text-transform: uppercase; color: #64748b; font-weight: 700; letter-spacing: 0.5px; }
        .widget-value { font-family: 'SF Mono', monospace; font-size: 20px; font-weight: 700; color: #fff; margin-top: 5px; }
        .widget-value span { font-size: 11px; color: var(--premium-bronze); margin-left: 2px; }

        /* FILTRO REGIONAL */
        .filter-scroller {
            display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
        }
        .filter-scroller::-webkit-scrollbar { display: none; }
        .filter-pill {
            background: #141923; border: 1px solid transparent; color: #94a3b8; padding: 6px 12px; font-size: 10px; font-weight: 700; border-radius: 20px; text-transform: uppercase; cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .filter-pill.active { background: var(--premium-bronze-glow); color: var(--premium-bronze); border-color: var(--premium-bronze); }

        /* LISTADO DE REPETIDORES PREMIUM */
        .ant-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
        .ant-row {
            background: #141923; border-radius: 12px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: all 0.2s;
        }
        .ant-row.active {
            background: linear-gradient(90deg, #0d231d 0%, #141923 100%); border-color: rgba(16,185,129,0.3);
        }
        .ant-name { font-size: 12px; font-weight: 600; color: #f8fafc; }
        .ant-meta { font-size: 10px; color: #64748b; margin-top: 2px; }
        .ant-row.active .ant-meta { color: #10b981; }

        .system-status {
            font-size: 11px; text-align: center; color: #eab308; font-weight: 600; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 8px;
        }

        /* ANIMACIÓN AUDIO SPECTRUM (SIMULADO) */
        .eq-container {
            display: flex; gap: 3px; height: 15px; align-items: flex-end;
        }
        .eq-bar { width: 3px; height: 2px; background: var(--premium-bronze); transition: height 0.1s ease; }
        .on .eq-bar { animation: bounce 0.8s ease infinite alternate; }
        .on .eq-bar:nth-child(2) { animation-delay: 0.2s; }
        .on .eq-bar:nth-child(3) { animation-delay: 0.4s; }
        .on .eq-bar:nth-child(4) { animation-delay: 0.1s; }

        @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        @keyframes bounce { 100% { height: 15px; } }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="infotainment-screen">
        <!-- TOP STATUS BAR -->
        <div class="top-status-bar">
            <div class="brand-logo">TRS <span>INFOTAINMENT</span></div>
        </div>

        <!-- SPLIT LAYOUT -->
        <div class="main-layout">
            
            <!-- PANEL IZQUIERDO: CONTROLES DE RADIO -->
            <div class="audio-panel">
                <div class="media-header">
                    <div class="media-title">Sintonizador FM RDS</div>
                    <button id="btn-encender" class="power-btn" onclick="encenderRadio()">🔘 Encender</button>
                </div>

                <div class="infotainment-tabs">
                    <button id="tab-nexofm" class="info-tab active" onclick="seleccionarEmisora('NEXOFM')">NEXOFM</button>
                    <button id="tab-trs1" class="info-tab" onclick="seleccionarEmisora('TRS1')">TRS1 RADIO</button>
                </div>

                <div class="oled-display">
                    <div class="rds-flags">
                        <div>
                            <span class="flag active">TP</span> &nbsp;&nbsp;
                            <span class="flag active">TA</span> &nbsp;&nbsp;
                            <span class="flag" id="flag-st">ST</span>
                        </div>
                        <div id="rds-af-status" class="af-status">AF OFF</div>
                    </div>

                    <div id="rds-ps-display" class="rds-ps">OFFLINE</div>

                    <div class="marquee-box">
                        <div id="rds-rt-display" class="rds-rt">Infotainment en modo standby. Encienda el sistema.</div>
                    </div>

                    <!-- MINI ECUALIZADOR DIGITAL -->
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                        <div style="font-size: 10px; color: var(--text-dark); font-weight: bold; letter-spacing: 0.5px;">PROCESADOR DIGITAL DE SEÑAL</div>
                        <div class="eq-container" id="eq-visual">
                            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                        </div>
                    </div>
                </div>

                <button class="power-btn" onclick="conmutarEmisoraManual()" style="border-color: var(--premium-bronze); color: var(--premium-bronze); padding: 12px;">🔄 Conmutación Rápida de Dial</button>
                <div id="status" class="system-status">SISTEMA INICIALIZADO</div>
            </div>

            <!-- PANEL DERECHO: TELEMETRÍA Y LISTADO GEOGRÁFICO -->
            <div class="telemetry-panel">
                <div class="media-title">INFORMACIÓN EMISORA</div>

                <!-- WIDGETS TIPO CABINA DE RENDIMIENTO -->
                <div class="widget-grid">
                    <div class="widget-card">
                        <div class="widget-label">Dial Activo</div>
                        <div id="lbl-dial" class="widget-value">---<span>MHz</span></div>
                    </div>
                    <div class="widget-card">
                        <div class="widget-label">Código PI</div>
                        <div id="lbl-pi" class="widget-value">----</div>
                    </div>
                    <div class="widget-card">
                        <div class="widget-label">Estilo PTY</div>
                        <div id="lbl-pty" class="widget-value" style="font-size:14px; padding-top:6px;">---</div>
                    </div>
                    <div class="widget-card">
                        <div class="widget-label">Potencia Repetidor</div>
                        <div id="lbl-potencia" class="widget-value">---<span>kW</span></div>
                    </div>
                </div>

                <!-- FILTROS MULTI-ZONA -->
                <div class="filter-scroller">
                    <button id="reg-todas" class="filter-pill active" onclick="filtrarRegion('TODAS')">Todas las Antenas</button>
                    <button id="reg-cantabria" class="filter-pill" onclick="filtrarRegion('CANTABRIA')">Cantabria</button>
                    <button id="reg-burgos" class="filter-pill" onclick="filtrarRegion('BURGOS')">Burgos</button>
                    <button id="reg-madrid" class="filter-pill" onclick="filtrarRegion('MADRID')">Madrid</button>
                </div>

                <!-- LISTA DE EMISORAS DINÁMICAS -->
                <div class="ant-list" id="contenedor-antenas"></div>
            </div>

        </div>
    </div>

    <audio id="musica" crossorigin="anonymous" preload="none"></audio>
    <audio id="siseo" src="siseo_fm.mp3" loop preload="none"></audio>

    <script>
        const musica = document.getElementById('musica');
        const siseo = document.getElementById('siseo');
        const btnEncender = document.getElementById('btn-encender');
        const eqVisual = document.getElementById('eq-visual');

        let emisoraActual = "NEXOFM"; 
        let antenaSintonizada = null;
        let conmutandoAF = false;
        let radioEncendida = false;
        let factorSenalActual = 0;
        let psInterval = null;
        let ultimaPosicionGPS = null;
        let regionFiltradaActual = "TODAS";

        const baseDatosEmisoras = {
            "NEXOFM": {
                streamUrl: "https://stream.zeno.fm/rub12huqwj7tv",
                antenas: [
                    { id: 1, nombre: "Burgos", region: "BURGOS", lat: 42.3834190, lon: -3.5530706, potencia: 1250, alcance: 35, dial: "98.8 MHz", pi: "E2FA", pty: "POP MUSIC", rt: "NEXOFM BURGOS - RED DE EMISORAS DE LA RUTA NORTE A-67" },
                    { id: 2, nombre: "Reinosa", region: "CANTABRIA", lat: 42.9996, lon: -4.1379, potencia: 500, alcance: 50, dial: "102.0 MHz", pi: "E2FA", pty: "POP MUSIC", rt: "NEXOFM REINOSA - SEÑAL EN VALLE DE CAMPOO" },
                    { id: 3, nombre: "Santander", region: "CANTABRIA", lat: 43.4623, lon: -3.8099, potencia: 2000, alcance: 50, dial: "90.2 MHz", pi: "E2FA", pty: "POP MUSIC", rt: "NEXOFM CANTABRIA - COBERTURA COSTERA Y REGIONAL" },
                    { id: 4, nombre: "Madrid Centro", region: "MADRID", lat: 40.4206, lon: -3.6639, potencia: 5000, alcance: 65, dial: "107.2 MHz", pi: "E2FA", pty: "POP MUSIC", rt: "NEXOFM MADRID - EMITIENDO DESDE EL CENTRO DE LA CAPITAL" }
                ]
            },
            "TRS1": {
                streamUrl: "https://stream.zeno.fm/ohpbtx1plq6uv", 
                antenas: [
                    { id: 1, nombre: "Santander Emisión principal", region: "CANTABRIA", lat: 43.4623, lon: -3.8099, potencia: 1000, alcance: 250, dial: "91.1 MHz", pi: "F441", pty: "ROCK MUSIC", rt: "TRS1 RADIO ROCK - EMISORA LOCAL EXCLUSIVA EN SANTANDER" },
                    { id: 2, nombre: "Madrid Centro", region: "MADRID", lat: 40.4206, lon: -3.6639, potencia: 4000, alcance: 55, dial: "98.8 MHz", pi: "F442", pty: "ROCK MUSIC", rt: "TRS1 MADRID - ROCK PURO EN LA COMUNIDAD DE MADRID" }
                ]
            }
        };

        function encenderRadio() {
            if (!radioEncendida) {
                radioEncendida = true;
                btnEncender.innerText = "🟢 Apagar";
                btnEncender.classList.add('on');
                eqVisual.classList.add('on');
                document.getElementById('rds-af-status').className = "af-status ok";
                document.getElementById('rds-af-status').innerText = "AF OK";
                siseo.play().catch(e => console.log("Simulando ruido analógico..."));
                if (ultimaPosicionGPS) {
                    procesarUbicacionGPS(ultimaPosicionGPS);
                } else {
                    document.getElementById('status').innerText = "BUSCANDO SATÉLITES GPS DEL SISTEMA...";
                }
            } else {
                cortarFlujoMusicaTotal();
                siseo.pause();
                radioEncendida = false;
                btnEncender.innerText = "🔘 Encender";
                btnEncender.classList.remove('on');
                eqVisual.classList.remove('on');
                document.getElementById('rds-af-status').className = "af-status";
                document.getElementById('rds-af-status').innerText = "AF OFF";
                clearInterval(psInterval);
                document.getElementById('rds-ps-display').innerText = "OFF-LINE";
                document.getElementById('rds-rt-display').innerText = "Infotainment en modo standby. Encienda el sistema.";
            }
        }

        function seleccionarEmisora(nombreEmisora) {
            if (emisoraActual === nombreEmisora) return;
            emisoraActual = nombreEmisora;
            antenaSintonizada = null;
            cortarFlujoMusicaTotal();

            document.getElementById('tab-nexofm').classList.toggle('active', nombreEmisora === "NEXOFM");
            document.getElementById('tab-trs1').classList.toggle('active', nombreEmisora === "TRS1");
            
            pintarEstructuraAntenas();
            if (ultimaPosicionGPS && radioEncendida) procesarUbicacionGPS(ultimaPosicionGPS);
        }

        function conmutarEmisoraManual() {
            if (emisoraActual === "NEXOFM") seleccionarEmisora("TRS1");
            else seleccionarEmisora("NEXOFM");
        }

        function filtrarRegion(region) {
            regionFiltradaActual = region;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active'));
            
            if(region === "TODAS") document.getElementById('reg-todas').classList.add('active');
            if(region === "CANTABRIA") document.getElementById('reg-cantabria').classList.add('active');
            if(region === "BURGOS") document.getElementById('reg-burgos').classList.add('active');
            if(region === "MADRID") document.getElementById('reg-madrid').classList.add('active');
            
            pintarEstructuraAntenas();
            if (ultimaPosicionGPS) procesarUbicacionGPS(ultimaPosicionGPS);
        }

        function cortarFlujoMusicaTotal() {
            musica.pause();
            musica.src = ""; 
            musica.load();
        }

        function pintarEstructuraAntenas() {
            const contenedor = document.getElementById('contenedor-antenas');
            contenedor.innerHTML = "";
            
            const antenasFiltradas = baseDatosEmisoras[emisoraActual].antenas.filter(antena => {
                return regionFiltradaActual === "TODAS" || antena.region === regionFiltradaActual;
            });

            if (antenasFiltradas.length === 0) {
                contenedor.innerHTML = `<div style="font-size:11px; color:#475569; text-align:center; padding:15px;">Fuera de rango geográfico regional.</div>`;
                return;
            }

            antenasFiltradas.forEach(antena => {
                const kwTexto = (antena.potencia >= 1000) ? (antena.potencia / 1000) + " kW" : antena.potencia + " W";
                const isActiva = (antenaSintonizada && antenaSintonizada.id === antena.id && antenaSintonizada.region === antena.region) ? "active" : "";
                const distTexto = antena.distanciaActual ? antena.distanciaActual.toFixed(1) : "--";

                contenedor.innerHTML += `
                    <div id="ant-${antena.region}-${antena.id}-ui" class="ant-row ${isActiva}">
                        <div>
                            <div class="ant-name">Repetidor ${antena.nombre}</div>
                            <div class="ant-meta">Freq: ${antena.dial} | P: ${kwTexto}</div>
                        </div>
                        <div style="text-align: right; font-family: monospace; font-size: 12px; font-weight: bold;">
                            <span id="dist-ant-${antena.region}-${antena.id}">${distTexto}</span> km
                        </div>
                    </div>
                `;
            });
        }

        function calcularDistanciaReal(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))); 
        }

        function procesarUbicacionGPS(posicion) {
            ultimaPosicionGPS = posicion;
            if (!radioEncendida) return;

            const miLat = posicion.coords.latitude;
            const miLon = posicion.coords.longitude;

            let mejorAntena = null;
            let menorDistancia = 999999;
            
            const antenasTotales = baseDatosEmisoras[emisoraActual].antenas;

            antenasTotales.forEach(antena => {
                let distanciaKm = calcularDistanciaReal(miLat, miLon, antena.lat, antena.lon);
                antena.distanciaActual = distanciaKm;

                const elUI = document.getElementById(`dist-ant-${antena.region}-${antena.id}`);
                if (elUI) elUI.innerText = distanciaKm.toFixed(1);

                if (distanciaKm < menorDistancia) {
                    menorDistancia = distanciaKm;
                    mejorAntena = antena;
                }
            });

            if (antenaSintonizada === null && mejorAntena) {
                antenaSintonizada = mejorAntena;
                actualizarInterfazAntena(mejorAntena);
            }

            if (mejorAntena && (mejorAntena.id !== antenaSintonizada.id || mejorAntena.region !== antenaSintonizada.region) && !conmutandoAF) {
                ejecutarCambioFrecuenciaAF(mejorAntena);
            }

            if (antenaSintonizada) {
                factorSenalActual = 1 - (antenaSintonizada.distanciaActual / antenaSintonizada.alcance);
                if (!conmutandoAF) {
                    procesarAudioFM(factorSenalActual);
                }
            }
        }

        function ejecutarCambioFrecuenciaAF(nuevaAntena) {
            conmutandoAF = true;
            clearInterval(psInterval);
            
            document.getElementById('rds-af-status').innerText = "SEARCH AF";
            document.getElementById('rds-af-status').className = "af-status searching";
            document.getElementById('rds-ps-display').innerText = "PI SEEK ";
            document.getElementById('status').innerText = "RDS AF: CAMBIANDO REPETIDOR DE FORMA ASÍNCRONA...";
            document.getElementById('status').style.color = "var(--premium-bronze)";
            document.getElementById('flag-st').classList.remove('active');
            
            cortarFlujoMusicaTotal();
            siseo.volume = 0.7;

            setTimeout(() => {
                antenaSintonizada = nuevaAntena;
                conmutandoAF = false;
                actualizarInterfazAntena(nuevaAntena);
                
                factorSenalActual = 1 - (nuevaAntena.distanciaActual / nuevaAntena.alcance);
                procesarAudioFM(factorSenalActual);
            }, 1200); 
        }

        function actualizarInterfazAntena(antena) {
            document.getElementById('lbl-dial').innerText = antena.dial;
            document.getElementById('lbl-pi').innerText = antena.pi;
            document.getElementById('lbl-pty').innerText = antena.pty;
            document.getElementById('lbl-potencia').innerText = (antena.potencia >= 1000) ? (antena.potencia / 1000) + " kW" : antena.potencia + " W";
            document.getElementById('rds-rt-display').innerText = antena.rt;
            
            document.getElementById('rds-af-status').innerText = "AF OK";
            document.getElementById('rds-af-status').className = "af-status ok";

            document.querySelectorAll('.ant-row').forEach(box => box.classList.remove('active'));
            const contenedorActivo = document.getElementById(`ant-${antena.region}-${antena.id}-ui`);
            if (contenedorActivo) contenedorActivo.classList.add('active');

            iniciarBuclePS(emisoraActual, antena.dial);
        }

        function iniciarBuclePS(nombreEmi, dialTexto) {
            clearInterval(psInterval);
            // Se eliminó la paginación de texto que alternaba con "CUPRA" y "CONNECT"
            const rdsTextoBucle = [nombreEmi.padEnd(8), dialTexto.padEnd(8), "SPAIN", "."];
            let paso = 0;
            
            document.getElementById('rds-ps-display').innerText = rdsTextoBucle[0];
            psInterval = setInterval(() => {
                paso = (paso + 1) % rdsTextoBucle.length;
                document.getElementById('rds-ps-display').innerText = rdsTextoBucle[paso];
            }, 3000);
        }

        function procesarAudioFM(factorSenal) {
            const statusLbl = document.getElementById('status');
            const flagSt = document.getElementById('flag-st');

            if (factorSenal > 0.25) {
                if (musica.paused || musica.src !== baseDatosEmisoras[emisoraActual].streamUrl) {
                    musica.src = baseDatosEmisoras[emisoraActual].streamUrl;
                    musica.play().catch(e => console.log("Canal streaming activo..."));
                }
                musica.volume = 1.0;
                siseo.volume = 0.0;
                flagSt.className = "flag active";
                statusLbl.innerText = `SINTONÍA DIGITAL EXCELENTE -> REPETIDOR: ${antenaSintonizada.nombre.toUpperCase()}`;
                statusLbl.style.color = "#10b981";
            } else if (factorSenal <= 0.25 && factorSenal > 0.0) {
                if (musica.paused || musica.src !== baseDatosEmisoras[emisoraActual].streamUrl) {
                    musica.src = baseDatosEmisoras[emisoraActual].streamUrl;
                    musica.play().catch(e => console.log("Señal FM baja..."));
                }
                const perdida = 1 - (factorSenal / 0.25);
                musica.volume = 1 - (perdida * 0.80);
                siseo.volume = perdida * 0.90;
                flagSt.className = "flag"; 
                statusLbl.innerText = "ADVERTENCIA: PÉRDIDA DE PROPAGACIÓN MULTICAMINO (MULTIPATH)";
                statusLbl.style.color = "#eab308";
            } else {
                cortarFlujoMusicaTotal();
                siseo.volume = 1.0; 
                flagSt.className = "flag";
                statusLbl.innerText = `FUERA DE COBERTURA PARA ${emisoraActual} EN ESTA UBICACIÓN.`;
                statusLbl.style.color = "#ef4444";
            }
        }

        // Render inicial
        pintarEstructuraAntenas();

        // Geolocalización de instrumentación del vehículo
        navigator.geolocation.watchPosition(procesarUbicacionGPS, (error) => {
            console.log("Error de localización: ", error);
            document.getElementById('status').innerText = "ERROR: SEÑAL GPS DEL SISTEMA PERDIDA.";
            document.getElementById('status').style.color = "#ef4444";
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    </script>
</body>
</html>
